message User {
  option (buf.validate.message).cel = {
    id: "User.at_least_one",
    message: "at least one of [account, name, uid] must be set",
    expression: "has(this.account) || has(this.name) || has(this.uid)"
  };
  enum RiskLevelId {
    RISK_LEVEL_ID_INFO = 0;
    RISK_LEVEL_ID_LOW = 1;
    RISK_LEVEL_ID_MEDIUM = 2;
    RISK_LEVEL_ID_HIGH = 3;
    RISK_LEVEL_ID_CRITICAL = 4;
    RISK_LEVEL_ID_OTHER = 99;
  }
  enum TypeId {
    TYPE_ID_UNKNOWN = 0;
    TYPE_ID_USER = 1;
    TYPE_ID_ADMIN = 2;
    TYPE_ID_SYSTEM = 3;
    TYPE_ID_SERVICE = 4;
    TYPE_ID_OTHER = 99;
  }
  Account account = 1;
  string credential_uid = 2;
  string display_name = 3;
  string domain = 4;
  string email_addr = 5;
  string forward_addr = 6;
  string full_name = 7;
  repeated Group groups = 8;
  bool has_mfa = 9;
  LdapPerson ldap_person = 10;
  string name = 11;
  Organization org = 12;
  string phone_number = 13;
  repeated ProgrammaticCredential programmatic_credentials = 14;
  string risk_level = 15;
  RiskLevelId risk_level_id = 16;
  int32 risk_score = 17;
  string type = 18;
  TypeId type_id = 19;
  string uid = 20;
  string uid_alt = 21;
}

message Vulnerability {
  option (buf.validate.message).cel = {
    id: "Vulnerability.just_one",
    message: "exactly one of [advisory, cve, cwe] must be set",
    expression: "(has(this.advisory) ? 1 : 0) + (has(this.cve) ? 1 : 0) + (has(this.cwe) ? 1 : 0) == 1"
  };
  enum FixCoverageId {
    FIX_COVERAGE_ID_UNKNOWN = 0;
    FIX_COVERAGE_ID_COMPLETE = 1;
    FIX_COVERAGE_ID_PARTIAL = 2;
