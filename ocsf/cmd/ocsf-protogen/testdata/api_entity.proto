    FIX_COVERAGE_ID_OTHER = 99;
  }
  Advisory advisory = 1;
  repeated AffectedCode affected_code = 2;
  repeated AffectedPackage affected_packages = 3;
  string category = 4;
  Cve cve = 5;
  Cwe cwe = 6;
  string dependency_chain = 7;
  string desc = 8;
  int64 exploit_last_seen_time = 9;
  string exploit_last_seen_time_dt = 10;
